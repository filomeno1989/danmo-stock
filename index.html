<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSS Stock — Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-box">

    <div style="text-align:center; margin-bottom:32px;">
      <div style="width:56px; height:56px; background:var(--amber); border-radius:12px;
                  display:flex; align-items:center; justify-content:center;
                  font-weight:700; font-size:20px; color:var(--navy); margin:0 auto 12px;">
        DS
      </div>
      <div style="font-size:20px; font-weight:700; color:var(--text);">DANMO SS</div>
      <div style="font-size:13px; color:var(--text2); margin-top:2px;">Gestão de Stock</div>
    </div>

    <div class="form-group" style="margin-bottom:16px;">
      <label>Utilizador</label>
      <input type="text" id="usuario" placeholder="Ex: DM0069" autocomplete="off">
    </div>

    <div class="form-group" style="margin-bottom:24px;">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••">
    </div>

    <button class="btn btn-primary w-100" onclick="entrar()" id="btn-entrar">
      Entrar
    </button>

    <div id="erro" style="display:none; margin-top:16px;"
         class="alert alert-danger">
      ⚠️ Utilizador ou senha incorrectos.
    </div>

  </div>
</div>

<script src="supabase.js"></script>
<script src="auth.js"></script>
<script>
  // Se já estiver logado, vai directo ao dashboard
  AUTH.init();
  if (AUTH.sessao) window.location.href = 'stock_dashboard.html';

  // Enter no campo senha faz login
  document.getElementById('senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') entrar();
  });

  async function entrar() {
    const usuario = document.getElementById('usuario').value.trim();
    const senha   = document.getElementById('senha').value.trim();
    const btn     = document.getElementById('btn-entrar');
    const erro    = document.getElementById('erro');

    if (!usuario || !senha) {
      erro.style.display = 'flex';
      erro.textContent = '⚠️ Preenche todos os campos.';
      return;
    }

    btn.textContent = 'A verificar...';
    btn.disabled = true;
    erro.style.display = 'none';

    const user = await AUTH.login(usuario, senha);

    if (user) {
      window.location.href = 'stock_dashboard.html';
    } else {
      erro.style.display = 'flex';
      erro.textContent = '⚠️ Utilizador ou senha incorrectos.';
      btn.textContent = 'Entrar';
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
